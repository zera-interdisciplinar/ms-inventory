name: Deploy QA

on:
  push:
    branches:
      - qa

env:
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/zera1405/repo/ms-inventory

jobs:
  deploy:
    name: Deploy to QA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/537842934721/locations/global/workloadIdentityPools/zera-pool/providers/github-provider
          service_account: github-actions-deploy@zera1405.iam.gserviceaccount.com

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: autopilot-cluster-1
          location: us-central1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build and Run Tests
        run: ./mvnw verify

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and Push Docker Image
        run: |
          ./mvnw package -DskipTests
          docker build \
            --tag ${{ env.IMAGE }}:qa \
            --tag ${{ env.IMAGE }}:qa-${{ github.sha }} \
            .
          docker push ${{ env.IMAGE }}:qa
          docker push ${{ env.IMAGE }}:qa-${{ github.sha }}

      - name: Deploy to GKE
        run: |
          sed -i "s|IMAGE_TAG|qa-${{ github.sha }}|g" k8s/deployment-qa.yaml
          kubectl apply -f k8s/deployment-qa.yaml -n qa
          kubectl apply -f k8s/service-qa.yaml -n qa
          kubectl rollout status deployment/ms-inventory -n qa --timeout=180s

      - name: Annotate Deployment
        run: |
          kubectl annotate deployment ms-inventory \
            -n qa \
            kubernetes.io/change-cause="QA deploy — commit ${{ github.sha }}" \
            --overwrite